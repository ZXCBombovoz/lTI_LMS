# =============================================================================
# MTUCI Labs — docker compose
# =============================================================================
# Использование:
#   1. Скопируйте .env.example в .env и заполните своими значениями
#   2. docker compose up -d --build    (либо запустите ./run.sh)
#   3. Откройте http://<server>:${HTTP_PORT:-3000}
#
# HTTPS — настройте reverse proxy на хосте (nginx/Caddy + Let's Encrypt).
# Простой пример nginx-конфига есть в README в конце .env.example.
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mtuci-labs:latest
    container_name: mtuci-labs
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-3000}:3000"
    environment:
      # Публичный URL вашего инструмента
      VITE_APP_URL:                 "${VITE_APP_URL:-}"

      # LTI 1.3
      LTI_CLIENT_ID:                "${LTI_CLIENT_ID:-}"
      LTI_ISSUER:                   "${LTI_ISSUER:-}"
      LTI_PRIVATE_KEY:              "${LTI_PRIVATE_KEY:-}"
      LTI_PLATFORM_JWKS_ENDPOINT:   "${LTI_PLATFORM_JWKS_ENDPOINT:-}"
      LTI_OIDC_AUTH_ENDPOINT:       "${LTI_OIDC_AUTH_ENDPOINT:-}"
      LTI_TOKEN_ENDPOINT:           "${LTI_TOKEN_ENDPOINT:-}"

      # Секреты лабораторий
      LAB_FLAG_SECRET:              "${LAB_FLAG_SECRET:-}"
      LAB_STATE_SECRET:             "${LAB_STATE_SECRET:-}"

      # Node
      NODE_ENV:                     "production"
      PORT:                         "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/labs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
